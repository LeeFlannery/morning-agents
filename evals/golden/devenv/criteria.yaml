agent: devenv
description: "DevEnv correctly classifies dev tool version freshness"

checks:
  - id: "xcode-major"
    description: "Xcode 15.4 → 16.2 is a major upgrade and should be action_needed"
    expected:
      finding_mentions: ["xcode", "Xcode"]
      severity: "action_needed"

  - id: "node-major"
    description: "Node 20 → 22 is a major upgrade and should be action_needed"
    expected:
      finding_mentions: ["node", "Node"]
      severity: "action_needed"

  - id: "python-needs-update"
    description: "Python 3.11.8 → 3.13.2 is a significant upgrade. A finding should exist mentioning Python with severity warning or action_needed (not info, since 3.11 → 3.13 is more than a patch)."
    expected:
      finding_mentions: ["python", "Python"]
      severity_at_least: "warning"

  - id: "all-tools-covered"
    description: "All four tools (xcode, vscode, node, python) should have findings"
    expected:
      min_findings: 4
