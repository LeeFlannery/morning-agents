site_name: morning-agents
site_description: A CLI morning briefing tool powered by MCP agents and Claude.
repo_url: https://github.com/LeeFlannery/morning-agents
repo_name: LeeFlannery/morning-agents

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Architecture: architecture.md
  - Agents: agents.md
  - Contracts: contracts.md
  - Skills: skills.md
  - CLI Reference: cli.md
  - Adding an Agent: adding-agents.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
